services:
  - type: web
    name: stegagen-api
    env: python
    rootDir: python-engine
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 900 --graceful-timeout 180 --keep-alive 75 --log-level info --worker-class gthread --max-requests 100 --max-requests-jitter 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: MAX_CONTENT_LENGTH
        value: 209715200
      - key: ALLOWED_ORIGINS
        value: https://steagnography-system.vercel.app
      - key: PROCESSING_TIMEOUT
        value: 900
    healthCheckPath: /api/health
    plan: free
