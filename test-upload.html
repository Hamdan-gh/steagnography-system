<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test File Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-area {
            border: 2px dashed #4CAF50;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .upload-area:hover {
            background-color: #f0f0f0;
        }
        .upload-area.drag-over {
            background-color: #e8f5e9;
            border-color: #2196F3;
        }
        .file-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            color: #4CAF50;
            font-weight: bold;
        }
        .error {
            color: #f44336;
            font-weight: bold;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #1976D2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .log {
            background: #263238;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .log div {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 File Upload Test</h1>
    <p>This page tests if file upload is working in your browser.</p>

    <div class="upload-area" id="dropZone">
        <h3>📁 Drag and Drop File Here</h3>
        <p>or click to browse</p>
        <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,image/png,image/jpeg" style="display: none;">
    </div>

    <div id="fileInfo" style="display: none;" class="file-info">
        <h3>Selected File:</h3>
        <p><strong>Name:</strong> <span id="fileName"></span></p>
        <p><strong>Type:</strong> <span id="fileType"></span></p>
        <p><strong>Size:</strong> <span id="fileSize"></span></p>
        <p><strong>MIME Type:</strong> <span id="fileMime"></span></p>
        <button onclick="clearFile()">Clear File</button>
        <button onclick="testExtraction()" id="extractBtn" disabled>Test Extraction API</button>
    </div>

    <div class="log" id="log">
        <div><strong>Console Log:</strong></div>
    </div>

    <script>
        let selectedFile = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'success') div.style.color = '#4CAF50';
            if (type === 'error') div.style.color = '#ff5252';
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }

        // Click to browse
        dropZone.addEventListener('click', () => {
            fileInput.click();
            addLog('File input clicked');
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            addLog(`File selected via input: ${file ? file.name : 'none'}`);
            if (file) {
                handleFile(file);
            }
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
            addLog('File dragged over drop zone');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
            addLog('File dragged away from drop zone');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            
            const file = e.dataTransfer.files[0];
            addLog(`File dropped: ${file ? file.name : 'none'}`);
            
            if (file) {
                handleFile(file);
            }
        });

        function handleFile(file) {
            addLog(`Processing file: ${file.name}`, 'info');
            
            // Validate file type
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg'];
            if (!validTypes.includes(file.type)) {
                addLog(`❌ Invalid file type: ${file.type}. Expected: ${validTypes.join(', ')}`, 'error');
                alert(`Invalid file type: ${file.type}\nPlease use PNG or JPEG`);
                return;
            }

            // Validate file size (10MB)
            const maxSize = 10 * 1024 * 1024;
            if (file.size > maxSize) {
                addLog(`❌ File too large: ${(file.size / 1024 / 1024).toFixed(2)}MB. Max: 10MB`, 'error');
                alert(`File too large: ${(file.size / 1024 / 1024).toFixed(2)}MB\nMax size: 10MB`);
                return;
            }

            selectedFile = file;
            addLog(`✅ File validated successfully`, 'success');
            displayFileInfo(file);
        }

        function displayFileInfo(file) {
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileType').textContent = file.type;
            document.getElementById('fileSize').textContent = `${(file.size / 1024).toFixed(2)} KB (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            document.getElementById('fileMime').textContent = file.type || 'unknown';
            
            fileInfo.style.display = 'block';
            document.getElementById('extractBtn').disabled = false;
            
            addLog(`File info displayed`, 'success');
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            addLog('File cleared');
        }

        async function testExtraction() {
            if (!selectedFile) {
                addLog('❌ No file selected', 'error');
                return;
            }

            const encryptionKey = prompt('Enter encryption key (16-32 characters):');
            if (!encryptionKey || encryptionKey.length < 16 || encryptionKey.length > 32) {
                addLog('❌ Invalid encryption key', 'error');
                alert('Encryption key must be 16-32 characters');
                return;
            }

            addLog('🚀 Starting extraction test...', 'info');
            addLog(`Backend URL: http://localhost:5000/api/extract`, 'info');

            const formData = new FormData();
            formData.append('stego_image', selectedFile);
            formData.append('encryption_key', encryptionKey);

            addLog('Sending request to backend...', 'info');

            try {
                const response = await fetch('http://localhost:5000/api/extract', {
                    method: 'POST',
                    body: formData,
                });

                addLog(`Response status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');

                const data = await response.json();
                addLog(`Response data: ${JSON.stringify(data, null, 2)}`, 
                    response.ok ? 'success' : 'error');

                if (response.ok) {
                    alert('✅ Extraction successful!\n\nCheck console log for details.');
                } else {
                    alert(`❌ Extraction failed:\n${data.error || 'Unknown error'}`);
                }
            } catch (error) {
                addLog(`❌ Network error: ${error.message}`, 'error');
                alert(`Network error: ${error.message}\n\nIs the Python backend running on port 5000?`);
            }
        }

        // Initial log
        addLog('Test page loaded - Ready to test file upload!', 'success');
        addLog('Backend should be running at: http://localhost:5000');
    </script>
</body>
</html>
